<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Feliz Dia das Mulheres</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styless.css" />
  </head>

  <body>
    <section id="inicio" class="tela">
      <h1>Feliz Dia das Mulheres 🌹</h1>
      <h2>Vivizinha🤍😁</h2>

      <button onclick="entrar()">Começar</button>
    </section>

    <section id="personagens" class="tela hidden">
      <h2>Alguém quer falar com você...</h2>

      <div class="cards">
        <div class="card" onclick="mostrar('nanami')">
          <img
            src="assets/Jujutsu-Kaisen-Nanami-pode-ganhar-memorial-na-Malasia.webp" />
          <p>Nanami</p>
        </div>

        <div class="card" onclick="mostrar('toji')">
          <img src="assets/wp13077136.jpg" />
          <p>Toji</p>
        </div>

        <div class="card" onclick="mostrar('itadori')">
          <img src="assets/download.jpg" />
          <p>Itadori</p>
        </div>
      </div>
    </section>

    <section id="mensagem" class="tela hidden">
      <img id="imgPersonagem" />

      <h2 id="nome"></h2>

      <p id="fala"></p>

      <button onclick="voltar()">Voltar</button>
      <button onclick="surpresa()">Ver surpresa</button>
    </section>

    <section id="final" class="tela hidden">
      <h1>Uma mensagem para você</h1>

      <div class="grupo">
        <img
          src="assets/Jujutsu-Kaisen-Nanami-pode-ganhar-memorial-na-Malasia.webp" />
        <img src="assets/wp13077136.jpg" />
        <img src="assets/download.jpg" />
      </div>

      <p class="finalTexto">
        Entre tantas pessoas no mundo, algumas simplesmente brilham mais. E se
        existisse alguém que merecesse ser protegida, admirada e valorizada...
        seria você.
      </p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
